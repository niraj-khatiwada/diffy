<head>
  <meta charset="UTF-8" />

  <!-- Primary Meta Tags -->
  <title>Diffy: Diff Viewer</title>
  <link rel="alternate" type="application/rssxml" title="Diffy: Diff Viewer"
    href="https://diffy.codeforreal.com/rss.xml">
  <link rel="canonical" href="https://diffy.codeforreal.com/">
  <meta name="title" content="Diffy: Advanced Diff Viewer">
  <meta name="description" content="Diffy is an advanced diff viewer for comparing text files.">
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://diffy.codeforreal.com/">
  <meta property="og:title" content="Diffy: Advanced Diff Viewer">
  <meta property="og:description" content="Diffy is an advanced diff viewer for comparing text files.">
  <meta property="og:image" content="https://diffy.codeforreal.com/og.jpg">
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://diffy.codeforreal.com/">

  <meta property="twitter:description" content="Diffy is an advanced diff viewer for comparing text files.">
  <meta property="twitter:image" content="https://diffy.codeforreal.com/og.jpg">
  <meta name="keywords" content="diff viewer, text diff, compare files, developer tools">
  <meta name="author" content="Code for Real">
  <meta name="theme-color" content="#71717b">
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    (() => {
      const stored = localStorage.getItem("theme");

      const isDark =
        stored === "dark" ||
        (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches);

      document.documentElement.classList.toggle("dark", isDark);
      document.documentElement.classList.toggle("light", !isDark);
    })();
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Diffy",
      "url": "https://diffy.codeforreal.com",
      "description": "An advanced diff viewer for comparing text files.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript",
      "image": "https://diffy.codeforreal.com/og.jpg"
    }
  </script>
</body>

</html>
